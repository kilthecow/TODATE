<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <title>TODATE</title>
</head>
<body>
    <h1>TODATE</h1>

    <form method="GET" action="/">
        <label for="date">날짜 선택:</label>
        <input type="date" id="date" name="date" value="{{ selected_date }}">
        <button type="submit">조회</button>
    </form>

    <hr>

    {% if selected_date %}
        <h2>{{ selected_date }} 할 일</h2>

        <form method="POST" action="/add">
            <input type="hidden" name="todo_date" value="{{ selected_date }}">
            <input type="text" name="content" placeholder="할 일을 입력하세요" required>
            <button type="submit">추가</button>
        </form>

        <ul>
            {% for todo in todos %}
                <li>
                    <form method="POST" action="/toggle/{{ todo[0] }}" style="display:inline;">
                        <input type="hidden" name="todo_date" value="{{ selected_date }}">
                        <button type="submit">
                            {% if todo[2] == 1 %}☑{% else %}☐{% endif %}
                        </button>
                    </form>

                    {% if todo[2] == 1 %}
                        <s>{{ todo[1] }}</s>
                    {% else %}
                        {{ todo[1] }}
                    {% endif %}

                    <form method="POST" action="/delete/{{ todo[0] }}" style="display:inline;">
                        <input type="hidden" name="todo_date" value="{{ selected_date }}">
                        <button type="submit">삭제</button>
                    </form>
                </li>
            {% endfor %}
        </ul>
    {% else %}
        <p>먼저 날짜를 선택하세요.</p>
    {% endif %}
</body>
</html>
